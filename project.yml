name: MealPrep
options:
  bundleIdPrefix: com.miguelsolorio
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15"
  swift: "6.0"

settings:
  base:
    PRODUCT_NAME: Meal Prep
    SWIFT_VERSION: 6.0
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  MealPrep:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MealPrep
    dependencies:
      - target: MealPrepShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miguelsolorio.mealprep
        INFOPLIST_FILE: MealPrep/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: 6.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: MealPrep/MealPrep.entitlements
    info:
      path: MealPrep/Info.plist
      properties:
        CFBundleDisplayName: Meal Prep
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - mealprep

  MealPrepShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MealPrepShareExtension
    settings:
      base:
        PRODUCT_NAME: MealPrepShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.miguelsolorio.mealprep.shareextension
        INFOPLIST_FILE: MealPrepShareExtension/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: 6.0
        CODE_SIGN_ENTITLEMENTS: MealPrepShareExtension/MealPrepShareExtension.entitlements
        SKIP_INSTALL: YES
    info:
      path: MealPrepShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Meal Prep Import
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule: "SUBQUERY(extensionItems, $extensionItem, SUBQUERY($extensionItem.attachments, $attachment, ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO \"public.url\" || ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO \"public.plain-text\").@count > 0).@count > 0"
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionPointIdentifier: com.apple.share-services

schemes:
  MealPrep:
    build:
      targets:
        MealPrep: all
        MealPrepShareExtension: [build]
    run:
      executable: MealPrep
    test:
      targets: []
    profile:
      executable: MealPrep
